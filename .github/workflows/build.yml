name: Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:  # يسمح بتشغيل يدوي من واجهة GitHub

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (مع تحديد حجم ذاكرة JVM مباشرة)
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx2048m
        # -Dorg.gradle.jvmargs يضمن تمرير معامل الذاكرة مباشرة لـ Gradle، متجاوزاً أي إعدادات خاطئة

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk